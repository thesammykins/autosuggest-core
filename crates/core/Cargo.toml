[package]
name = "autosuggest-core"
version = "0.0.0"
description = "Pure completion & correction engine for terminals (M0: types only)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "autosuggest_core"
path = "src/lib.rs"

[features]
# Real, read-only `$PATH` scanner (`correct::PathCommandResolver`). Enabled by
# default for convenient embedding; the pure engine paths never require it and
# always take an injected `CommandResolver`. See `correct::resolver` docs.
default = ["std-resolver"]
std-resolver = []

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
regex = { workspace = true }
